name: tarckfit
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI & icons
  flutter_riverpod: ^2.4.9
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.2.1
  confetti: ^0.8.0
  fl_chart: ^1.0.0
  syncfusion_flutter_charts: ^30.2.6
  syncfusion_flutter_gauges: ^30.2.6
  country_code_picker: ^3.4.0
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.1
  # Permissions & sensors
  location: ^8.0.1
  permission_handler: ^12.0.1
  pedometer: ^4.1.1

  # Maps
  google_maps_flutter: ^2.12.3
  flutter_map: ^7.0.0
  latlong2: ^0.9.1

  # Date & picker
  flutter_picker_plus: ^1.5.2
  month_picker_dialog: ^6.5.0

  # Scanner
  card_scanner: ^1.0.2

  # UI & list
  flutter_slidable: ^4.0.0
  # Navigation
  go_router: ^16.2.1

  # Internationalization
  intl: ^0.20.2
  hive_flutter: ^1.1.0
  firebase_app_check: ^0.3.2+10

  # Notifications (optional)
  # awesome_notifications: ^0.8.2

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/
    - assets/achievements_batch/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
flutter_icons:
  android: true
  ios: true
  image_path: "assets/launcher_main.png"
  adaptive_icon_background: "#FF661FCC"
  adaptive_icon_foreground: "assets/launcher_main.png"
